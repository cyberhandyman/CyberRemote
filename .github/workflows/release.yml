name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :protocol:test

      - name: Decode signing keystore
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' && '/tmp/release.keystore' || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release*.apk \
             companion-remote-${{ github.ref_name }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: companion-remote-${{ github.ref_name }}.apk
          generate_release_notes: true
